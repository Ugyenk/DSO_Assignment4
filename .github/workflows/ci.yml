name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # ─── Step 1: Checkout ────────────────────────────────────────────
      - name:  Checkout repository
        uses: actions/checkout@v3

      # ─── Step 2: Python setup ─────────────────────────────────────────
      - name:  Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      # ─── Step 3: Cache pip ────────────────────────────────────────────
      - name:  Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ─── Step 4: Install dependencies ────────────────────────────────
      - name:  Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─── Step 5: Run unit tests ───────────────────────────────────────
      - name:  Run tests with pytest
        run: pytest --tb=short -v

      # ─── Step 6: Docker login ─────────────────────────────────────────
      - name:  Log in to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ─── Step 7: Build & push Docker image ───────────────────────────
      - name:  Build and push Docker image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            aizenchan/dso_assignment4:latest
            aizenchan/dso_assignment4:${{ github.sha }}

      # ─── Step 8: Deploy to Render ─────────────────────────────────────
      - name:  Deploy to Render
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "✅ Tests passed. Triggering Render deployment..."
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            && echo "🚀 Render deployment triggered!" \
            || echo "⚠️  Set RENDER_DEPLOY_HOOK_URL secret to enable auto-deploy"
